<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Viral Clothing Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .controls h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .sort-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button.active {
            background: #764ba2;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .video-thumbnail {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .video-info {
            padding: 20px;
        }

        .video-link {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
            word-break: break-all;
        }

        .video-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .metric {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .metric-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .metric-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 3px;
        }

        .inquiry-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
        }

        .inquiry-count {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .post-time {
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5em;
        }

        .no-videos {
            background: white;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            color: #666;
            font-size: 1.2em;
        }

        .refresh-btn {
            background: #28a745;
            margin-left: auto;
        }

        .refresh-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 TikTok Viral Clothing Finder</h1>
            <p class="subtitle">Discover trending fashion videos with high product inquiry engagement</p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-videos">0</div>
                <div class="stat-label">Total Videos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-inquiries">0</div>
                <div class="stat-label">Product Inquiries</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-views">0</div>
                <div class="stat-label">Total Views</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-likes">0</div>
                <div class="stat-label">Total Likes</div>
            </div>
        </div>

        <div class="controls">
            <h3>Sort By:</h3>
            <div class="sort-buttons">
                <button class="sort-btn active" data-sort="product_inquiry_comments" onclick="sortVideos('product_inquiry_comments')">
                    🔥 Product Inquiries
                </button>
                <button class="sort-btn" data-sort="views" onclick="sortVideos('views')">
                    👁️ Views
                </button>
                <button class="sort-btn" data-sort="likes" onclick="sortVideos('likes')">
                    ❤️ Likes
                </button>
                <button class="refresh-btn" onclick="loadData()">
                    🔄 Refresh
                </button>
            </div>
        </div>

        <div class="videos-grid" id="videos-container">
            <div class="loading">Loading videos...</div>
        </div>
    </div>

    <script>
        let currentSort = 'product_inquiry_comments';

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toLocaleString();
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            
            if (diffHours < 1) {
                return 'Just now';
            } else if (diffHours < 24) {
                return `${diffHours}h ago`;
            } else {
                return date.toLocaleDateString();
            }
        }

        function sortVideos(sortBy) {
            currentSort = sortBy;
            
            // Update button states
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.sort === sortBy) {
                    btn.classList.add('active');
                }
            });
            
            loadVideos();
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('total-videos').textContent = formatNumber(data.stats.total_videos);
                    document.getElementById('total-inquiries').textContent = formatNumber(data.stats.total_inquiries);
                    document.getElementById('total-views').textContent = formatNumber(data.stats.total_views);
                    document.getElementById('total-likes').textContent = formatNumber(data.stats.total_likes);
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadVideos() {
            const container = document.getElementById('videos-container');
            container.innerHTML = '<div class="loading">Loading videos...</div>';
            
            try {
                const response = await fetch(`/api/videos?sort_by=${currentSort}&order=DESC`);
                const data = await response.json();
                
                if (data.success && data.videos.length > 0) {
                    container.innerHTML = data.videos.map(video => `
                        <div class="video-card">
                            <img class="video-thumbnail" 
                                 src="${video.thumbnail_url || 'https://via.placeholder.com/350x250?text=TikTok+Video'}" 
                                 alt="Video thumbnail"
                                 onerror="this.src='https://via.placeholder.com/350x250?text=TikTok+Video'">
                            <div class="video-info">
                                <a href="${video.video_link}" target="_blank" class="video-link">
                                    📱 Open Video
                                </a>
                                
                                <div class="inquiry-badge">
                                    <div class="inquiry-count">${video.product_inquiry_comments}</div>
                                    <div>Product Inquiries</div>
                                </div>
                                
                                <div class="metrics">
                                    <div class="metric">
                                        <div class="metric-value">${formatNumber(video.views)}</div>
                                        <div class="metric-label">Views</div>
                                    </div>
                                    <div class="metric">
                                        <div class="metric-value">${formatNumber(video.likes)}</div>
                                        <div class="metric-label">Likes</div>
                                    </div>
                                    <div class="metric">
                                        <div class="metric-value">${formatNumber(video.total_comments)}</div>
                                        <div class="metric-label">Comments</div>
                                    </div>
                                    <div class="metric">
                                        <div class="metric-value">${((video.product_inquiry_comments / video.total_comments) * 100).toFixed(1)}%</div>
                                        <div class="metric-label">Inquiry Rate</div>
                                    </div>
                                </div>
                                
                                <div class="post-time">Posted: ${formatDate(video.post_time)}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="no-videos">No videos found. Run the bot to start collecting data!</div>';
                }
            } catch (error) {
                console.error('Error loading videos:', error);
                container.innerHTML = '<div class="no-videos">Error loading videos. Please try again.</div>';
            }
        }

        async function loadData() {
            await Promise.all([loadStats(), loadVideos()]);
        }

        // Load data on page load
        loadData();

        // Auto-refresh every minute
        setInterval(loadData, 60000);
    </script>
</body>
</html>
